services:
  - type: web
    name: mini-course-agent-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: COURSE_AGENT_MODE
        value: openai
      - key: OPENAI_MODEL
        value: gpt-4.1-mini
      - key: FRONTEND_ORIGINS
        sync: false
      - key: OPENAI_API_KEY
        sync: false
